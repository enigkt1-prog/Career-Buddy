name: scrape-jobs

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_FALLBACK_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync deps
        run: uv sync --frozen --extra gemini

      - name: Run scraper
        run: uv run python -m career_buddy_scraper.cli.scrape

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-${{ github.run_id }}
          path: |
            backend/artifacts/run-stats*.json
            backend/artifacts/cache
          if-no-files-found: ignore
          retention-days: 7
